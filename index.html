<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UNIQLOCK - Music × Dance × Clock</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Una fiel recreación premium de la icónica campaña de marketing digital UNIQLOCK de Uniqlo. Combinación hipnótica de música, danza minimalista y reloj digital.">
    <meta name="keywords" content="uniqlock, clock, dance, music, uniqlo, screensaver, minimalist clock, retro, web design">
    <meta name="author" content="Antigravity AI">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="UNIQLOCK - Music × Dance × Clock">
    <meta property="og:description" content="Recreación web interactiva y minimalista de UNIQLOCK con música y danza sincronizadas.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Start Overlay (To handle Autoplay Policy) -->
    <div id="start-overlay" class="overlay">
        <div class="start-card">
            <div class="uniqlo-logo">
                <span>UNIQLO</span>
                <span class="logo-sub">CLOCK</span>
            </div>
            <h1>MUSIC × DANCE × CLOCK</h1>
            <p class="description">Una recreación moderna del clásico widget de 2007. Activa el sonido para vivir la experiencia completa.</p>
            <button id="btn-start" class="btn-primary">
                <svg class="icon-play" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5V19L19 12L8 5Z" fill="currentColor"/>
                </svg>
                INICIAR RELOJ
            </button>
            <div class="footer-note">Utiliza únicamente los archivos de sonido locales de tu sistema.</div>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="app-container" class="app-hidden">
        
        <!-- The Core Widget Frame (Keeps the original ratio but scales responsively) -->
        <main id="widget-frame">
            
            <!-- Clock Screen -->
            <div id="clock-screen" class="widget-screen active">
                <div class="clock-content">
                    <div id="clock-time" class="time-display">00:00:00</div>
                    <div class="clock-extra">
                        <div id="clock-ms" class="ms-display">.00</div>
                        <div id="clock-date" class="date-display">SAB. 06 JUN.</div>
                    </div>
                </div>
                <!-- Beat Pulse Line -->
                <div class="beat-bar">
                    <div id="beat-pulse" class="pulse-line"></div>
                </div>
            </div>

            <!-- Dance / Visual Screen -->
            <div id="dance-screen" class="widget-screen">
                <canvas id="dancer-canvas"></canvas>
                
                <!-- Beat Visualizer overlay in corners -->
                <div class="visualizer-dots">
                    <div class="dot dot-1"></div>
                    <div class="dot dot-2"></div>
                    <div class="dot dot-3"></div>
                    <div class="dot dot-4"></div>
                </div>
                <div class="overlay-track-info" id="overlay-track-info">CARGANDO...</div>
            </div>

            <!-- Transition Layer for screen flips/sweeps -->
            <div id="transition-curtain" class="curtain"></div>
        </main>

        <!-- Bottom Controls and Information Panel -->
        <footer id="control-bar">
            <div class="control-group text-info">
                <span class="track-indicator">
                    <span class="status-indicator-light"></span>
                    <span id="track-name">Track: --</span>
                </span>
            </div>
            
            <div class="control-group buttons">
                <!-- Play/Pause -->
                <button id="btn-toggle-play" class="control-btn" title="Reproducir/Pausar">
                    <svg viewBox="0 0 24 24" class="btn-icon icon-pause-svg"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
                    <svg viewBox="0 0 24 24" class="btn-icon icon-play-svg hidden"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                </button>

                <!-- Mute/Unmute & Volume Slider -->
                <div class="volume-control">
                    <button id="btn-toggle-mute" class="control-btn" title="Silenciar">
                        <svg viewBox="0 0 24 24" class="btn-icon icon-volume-high"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/></svg>
                        <svg viewBox="0 0 24 24" class="btn-icon icon-volume-mute hidden"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/></svg>
                    </button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7">
                </div>

                <!-- Playlist Selector (Day vs Night vs Auto) -->
                <select id="playlist-select" class="dropdown-control" title="Seleccionar Lista de Reproducción">
                    <option value="auto">Automático (Día/Noche)</option>
                    <option value="day">Modo Día ☀️</option>
                    <option value="night">Modo Noche 🌙</option>
                </select>

                <!-- Fullscreen -->
                <button id="btn-fullscreen" class="control-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" class="btn-icon"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Core Scripts -->
    <script src="dancer.js"></script>
    <script src="script.js"></script>
</body>
</html>
